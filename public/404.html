<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e41d22" />
    <meta name="robots" content="noindex, follow" />
    <title>404 — McBotto</title>
    <link rel="icon" type="image/svg+xml" href="/assets/vectores/favicon_1.svg" />
    <style>
      :root {
        --red: #e41d22;
        --yellow: #ffc700;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      body {
        background: var(--yellow);
        color: var(--red);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        gap: 1.25rem;
        overflow: hidden;
      }
      h1 {
        font-size: clamp(6rem, 22vw, 16rem);
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.03em;
      }
      p {
        font-size: clamp(1rem, 2.4vw, 1.4rem);
        font-weight: 600;
        max-width: 22ch;
      }
      a {
        color: var(--yellow);
        background: var(--red);
        padding: 0.75rem 1.5rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition: opacity 0.2s;
        font-size: clamp(0.85rem, 1.8vw, 1rem);
      }
      a:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>This toy doesn't exist… yet.</p>
    <a href="/">Back to McBotto</a>
  </body>
</html>
